name: surabayartmobile
description: "SurabayArt Mobile Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.5+1

  # Supabase
  supabase_flutter: ^2.15.4

  # UI
  google_fonts: ^8.1.0
  cached_network_image: ^3.4.1

  # Utilities
  intl: ^0.20.3

  # Image Picker
  image_picker: ^1.2.0

  # QR Code
  qr_flutter: ^4.1.0

  # SVG
  flutter_svg: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/